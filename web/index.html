<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mane 1차 fixed</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <div class="viewer">
            <div class="bg">
                <div id="face" class="face">&gt;o&lt;</div>
            </div>
            <div id="status" class="status">연결 전</div>
        </div>

        <div class="chat-panel">
            <div class="title">Mane AI</div>
            <div id="chat" class="chat"></div>

            <div class="buttons">
                <button id="stopBtn">응답 중지</button>
                <button id="regenBtn">응답 재생성</button>
            </div>

            <div class="input-row">
                <input id="messageInput" type="text" placeholder="메시지 입력..." autocomplete="off">
                <button id="sendBtn">전송</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
